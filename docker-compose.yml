services:
  # ── PostgreSQL database ───────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashboard_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-dashboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dashboard} -d ${POSTGRES_DB:-dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ── One-shot migration + seed (runs once, then exits) ─────────────────────
  migrate:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-dashboard}:${POSTGRES_PASSWORD:-dashboard_pass}@db:5432/${POSTGRES_DB:-dashboard}?schema=public"
      SEED_ADMIN_EMAIL:    ${SEED_ADMIN_EMAIL:-admin@vedpragya.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin123!}
      SEED_USER_EMAIL:     ${SEED_USER_EMAIL:-ceo@acme.local}
      SEED_USER_PASSWORD:  ${SEED_USER_PASSWORD:-Client123!}
    # db push syncs the schema; seed creates the super admin + demo data
    command: >
      sh -c "
        npx prisma db push --skip-generate &&
        npx prisma db seed
      "
    restart: "no"

  # ── Next.js application ───────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:  "postgresql://${POSTGRES_USER:-dashboard}:${POSTGRES_PASSWORD:-dashboard_pass}@db:5432/${POSTGRES_DB:-dashboard}?schema=public"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required. Run: openssl rand -base64 32}
      NEXTAUTH_URL:    ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV:        production

volumes:
  postgres_data:
